specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Usercentrics
providerId: usercentrics
created: '2026-05-25'
modified: '2026-05-25'
reconciled: false
tags:
  - Privacy
  - Consent
  - CMP
  - Plans
description: Usercentrics publishes session-based public pricing for Web CMP and Server-Side Tagging,
  daily-active-user pricing for App CMP, and custom pricing for Corporate, TV Premium, and App Premium.
notes: All paid plans offer a 14-day free trial; no credit card required. EUR prices captured from the
  public pricing page.
sources:
  - https://usercentrics.com/pricing/
plans:
  - id: web-cmp-free
    name: Web CMP Free
    type: free
    description: Single-domain, single-regulation Web CMP with 1,000 sessions/month.
    entries:
      - label: Sessions
        name: sessions
        type: flat
        metric: sessions
        limit: 1000
        timeFrame: monthly
        geo: global
        unit: 1
        price: 0
        currency: EUR
        userMultiplied: false
    elements:
      - name: 1 domain
      - name: 1 regulation
      - name: 2 languages
      - name: Core consent banner features
  - id: web-cmp-essential
    name: Web CMP Essential
    type: paid
    description: Entry-tier Web CMP with basic customization and dashboards.
    entries:
      - label: Monthly subscription
        name: subscription
        type: flat
        metric: month
        limit: 1500
        timeFrame: monthly
        geo: global
        unit: 1
        price: 7
        currency: EUR
        userMultiplied: false
