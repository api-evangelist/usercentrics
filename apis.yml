aid: usercentrics
url: https://raw.githubusercontent.com/api-evangelist/usercentrics/refs/heads/main/apis.yml
name: Usercentrics
kind: company
description: Usercentrics is a Munich-based consent management platform (CMP) and privacy compliance
  provider. Founded in 2017 and led by CEO Donna Dror, Usercentrics acquired Danish CMP Cookiebot
  (Cybot) in September 2021 and acquired MCP Manager in January 2026. The platform serves 2.4M+
  websites and apps across 195 countries, processing 8.8B+ monthly consents. Products span Web CMP,
  App CMP, CTV CMP, Server-Side Tagging, Meta Signals Gateway, Preference Manager, Privacy Policy
  Generator, Compliance Scanners, and MCP Manager for AI governance.
