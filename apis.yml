apis:
  - aid: usercentrics:app-cmp-sdk
    name: Usercentrics App CMP SDK
    description: Mobile and TV consent management SDK with native iOS (11+), tvOS (11+), Android (API 16+),
      AndroidTV, Unity (2018.4+), Flutter (1.20+), and React Native (0.65+) support. Comprises
      UsercentricsCore (backend logic) and UsercentricsUI (prebuilt banner). Supports GDPR, CCPA, LGPD,
      and IAB TCF 2.0.
    humanURL: https://docs.usercentrics.com/cmp_in_app_sdk/latest/
    tags:
      - SDK
      - Mobile
      - iOS
      - Android
      - Flutter
      - React Native
      - Unity
      - TV
      - Consent
    properties:
      - type: Documentation
        url: https://docs.usercentrics.com/cmp_in_app_sdk/latest/
      - type: APIReference
        url: https://docs.usercentrics.com/cmp_in_app_sdk/latest/api/api_documentation/
      - type: SDK
        url: https://github.com/Usercentrics/flutter-sdk
        name: Flutter SDK
      - type: SDK
        url: https://github.com/Usercentrics/react-native-sdk
        name: React Native SDK
      - type: SDK
        url: https://github.com/Usercentrics/ios-sample
        name: iOS Sample
      - type: SDK
        url: https://github.com/Usercentrics/android-sample
        name: Android Sample
      - type: OpenAPI
        url: openapi/usercentrics-app-cmp-sdk-openapi.yml
  - aid: usercentrics:web-cmp-v3
    name: Usercentrics Web CMP (V3)
    description: Browser-side consent management platform for websites. Exposes the UC_UI JavaScript API,
      IAB __tcfapi (TCF 2.3), IAB __gpp (GPP), dataLayer events, and Google Consent Mode v2 / Microsoft UET
      Consent Mode signals. Configurable through the Usercentrics Admin Interface and delivered via the
      Usercentrics CDN.
    humanURL: https://docs.usercentrics.com/cmp_v3/latest/
    tags:
      - Web
      - JavaScript
      - CMP
      - TCF
      - GPP
      - Consent Mode
    properties:
      - type: Documentation
        url: https://docs.usercentrics.com/cmp_v3/latest/
      - type: OpenAPI
        url: openapi/usercentrics-web-cmp-v3-openapi.yml
  - aid: usercentrics:cookiebot-cmp
    name: Cookiebot CMP
    description: Cookiebot consent management platform (a Usercentrics company since the September 2021
      Cybot acquisition). Provides a JavaScript SDK (Cookiebot global, show()/hide()/renew()/getScript()/
      runScripts()/withdraw()/submitCustomConsent()), CookiebotOnConsentReady / OnAccept / OnDecline
      events, server-side CookieConsent cookie integration (C#, PHP, VB samples), and the patented monthly
      site scanner.
    humanURL: https://www.cookiebot.com/en/developer/
    tags:
      - Cookies
      - Scanner
      - JavaScript
      - GDPR
      - GTM
    properties:
      - type: Documentation
        url: https://www.cookiebot.com/en/developer/
      - type: Documentation
        url: https://www.cookiebot.com/en/help/
      - type: Support
        url: https://support.cookiebot.com/hc/en-us/
      - type: OpenAPI
        url: openapi/usercentrics-cookiebot-cmp-openapi.yml
  - aid: usercentrics:server-side-tagging
    name: Usercentrics Server-Side Tagging (sGTM)
    description: Hosted server-side Google Tag Manager service for first-party data collection, consent
      enforcement, and tag execution off the browser. Includes Meta Signals Gateway for the Meta
      Conversions API and consent-aware event forwarding.
    humanURL: https://usercentrics.com/integrations/
    tags:
      - Server-Side
      - GTM
      - Tagging
      - Meta
      - Conversions API
    properties:
      - type: Documentation
        url: https://usercentrics.com/integrations/
